<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Harian Hana ✨</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Tailwind Config for Custom Colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'soft-bg': '#FAF7F2',
                        'soft-pink': '#FDF3F6',
                        'accent-pink': '#E8B4B8',
                        'text-main': '#4A403A',
                        'text-light': '#8C7A6B',
                        'cat-rutinitas': '#D6E4E5',
                        'cat-hobi': '#FBE0E0',
                        'cat-tugas': '#FDF0D5',
                        'cat-santai': '#E0ECE4'
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #FAF7F2;
            background-image: radial-gradient(#E8B4B8 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            color: #4A403A;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
        }

        .checkbox-custom:checked + div {
            background-color: #E8B4B8;
            border-color: #E8B4B8;
        }

        .checkbox-custom:checked + div svg {
            opacity: 1;
        }

        .task-item {
            transition: all 0.3s ease;
        }
        
        .task-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .task-done p.task-title {
            text-decoration: line-through;
            color: #8C7A6B;
            opacity: 0.7;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #E8B4B8;
            border-radius: 10px;
        }
    </style>
</head>
<body class="font-sans min-h-screen flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-md rounded-[2rem] p-8 relative overflow-hidden">
        <!-- Decorative blobs -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-cat-hobi rounded-full mix-blend-multiply filter blur-xl opacity-70"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-cat-rutinitas rounded-full mix-blend-multiply filter blur-xl opacity-70"></div>

        <!-- Header -->
        <header class="relative z-10 mb-8 text-center">
            <h1 class="font-serif text-3xl font-semibold mb-1">Hai, Hana! ✨</h1>
            <p class="text-text-light text-sm" id="current-date">Ayo susun hari yang indah.</p>
        </header>

        <!-- Input Section -->
        <form id="schedule-form" class="relative z-10 bg-white/60 p-5 rounded-2xl mb-8 border border-white">
            <div class="mb-4">
                <input type="text" id="task-input" placeholder="Apa rencanamu hari ini?" required
                    class="w-full bg-transparent border-b-2 border-accent-pink/30 focus:border-accent-pink outline-none px-2 py-2 text-text-main placeholder-text-light/60 transition-colors">
            </div>
            
            <div class="flex gap-2 mb-4">
                <input type="time" id="time-input" 
                    class="bg-white px-3 py-2 rounded-xl text-sm border border-gray-100 outline-none focus:ring-2 focus:ring-accent-pink/20 text-text-light w-1/3">
                
                <select id="category-input" class="bg-white px-3 py-2 rounded-xl text-sm border border-gray-100 outline-none focus:ring-2 focus:ring-accent-pink/20 text-text-light w-2/3 appearance-none cursor-pointer">
                    <option value="rutinitas">🗓️ Rutinitas</option>
                    <option value="hobi">🎨 Hobi</option>
                    <option value="tugas">💻 Tugas</option>
                    <option value="santai">☕ Santai</option>
                </select>
            </div>

            <button type="submit" class="w-full bg-accent-pink hover:bg-[#D9A3A7] text-white font-medium py-3 rounded-xl transition-all duration-300 shadow-sm flex items-center justify-center gap-2">
                <i class="ph ph-plus-circle text-xl"></i> Tambah Jadwal
            </button>
        </form>

        <!-- Filters -->
        <div class="flex justify-between items-center mb-4 relative z-10">
            <h2 class="font-medium text-lg">Jadwalku</h2>
            <span class="text-xs bg-white px-3 py-1 rounded-full text-text-light shadow-sm" id="task-counter">0/0 Selesai</span>
        </div>

        <!-- Schedule List -->
        <div class="relative z-10 max-h-[350px] overflow-y-auto pr-1 pb-4 space-y-3" id="schedule-list">
            <!-- Items will be injected here via JavaScript -->
        </div>

    </div>

    <script>
        // Set Current Date
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', dateOptions);

        // State Management
        let schedules = JSON.parse(localStorage.getItem('hana_schedules')) || [];

        // DOM Elements
        const form = document.getElementById('schedule-form');
        const taskInput = document.getElementById('task-input');
        const timeInput = document.getElementById('time-input');
        const categoryInput = document.getElementById('category-input');
        const scheduleList = document.getElementById('schedule-list');
        const taskCounter = document.getElementById('task-counter');

        // Category Colors mapping
        const categoryStyles = {
            'rutinitas': 'bg-cat-rutinitas text-[#5E8B8E]',
            'hobi': 'bg-cat-hobi text-[#B26B6B]',
            'tugas': 'bg-cat-tugas text-[#B28B47]',
            'santai': 'bg-cat-santai text-[#6B8E7B]'
        };

        // Form Submit Handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newSchedule = {
                id: Date.now(),
                text: taskInput.value.trim(),
                time: timeInput.value || '',
                category: categoryInput.value,
                completed: false
            };

            schedules.push(newSchedule);
            saveData();
            renderSchedules();
            
            // Reset form
            taskInput.value = '';
            timeInput.value = '';
        });

        // Toggle Complete
        function toggleComplete(id) {
            schedules = schedules.map(schedule => {
                if (schedule.id === id) {
                    return { ...schedule, completed: !schedule.completed };
                }
                return schedule;
            });
            saveData();
            renderSchedules();
        }

        // Delete Schedule
        function deleteSchedule(id) {
            schedules = schedules.filter(schedule => schedule.id !== id);
            saveData();
            renderSchedules();
        }

        // Save to LocalStorage
        function saveData() {
            localStorage.setItem('hana_schedules', JSON.stringify(schedules));
        }

        // Render Data to UI
        function renderSchedules() {
            scheduleList.innerHTML = '';
            
            if (schedules.length === 0) {
                scheduleList.innerHTML = `
                    <div class="text-center py-8 opacity-60">
                        <i class="ph ph-sparkle text-4xl text-accent-pink mb-2"></i>
                        <p class="text-sm">Belum ada jadwal. Yuk, tambah kegiatanmu!</p>
                    </div>
                `;
            }

            // Sort: Incomplete first, then sort by time if available
            const sortedSchedules = [...schedules].sort((a, b) => {
                if (a.completed === b.completed) {
                    if(a.time && b.time) return a.time.localeCompare(b.time);
                    return 0;
                }
                return a.completed ? 1 : -1;
            });

            let completedCount = 0;

            sortedSchedules.forEach(schedule => {
                if(schedule.completed) completedCount++;

                const catStyle = categoryStyles[schedule.category];
                const catLabel = schedule.category.charAt(0).toUpperCase() + schedule.category.slice(1);
                
                const timeDisplay = schedule.time 
                    ? `<span class="flex items-center gap-1 text-xs text-text-light"><i class="ph ph-clock"></i> ${schedule.time}</span>` 
                    : '';

                const item = document.createElement('div');
                item.className = `task-item bg-white p-4 rounded-2xl flex items-center gap-4 border border-gray-50 ${schedule.completed ? 'task-done bg-gray-50/50' : ''}`;
                
                item.innerHTML = `
                    <label class="relative flex items-center cursor-pointer">
                        <input type="checkbox" class="checkbox-custom sr-only" ${schedule.completed ? 'checked' : ''} onchange="toggleComplete(${schedule.id})">
                        <div class="w-6 h-6 rounded-full border-2 border-accent-pink/50 flex items-center justify-center transition-colors">
                            <svg class="w-3 h-3 text-white opacity-0 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>
                    </label>
                    
                    <div class="flex-1 min-w-0">
                        <p class="task-title font-medium truncate mb-1">${schedule.text}</p>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-semibold px-2 py-0.5 rounded-full ${catStyle}">${catLabel}</span>
                            ${timeDisplay}
                        </div>
                    </div>
                    
                    <button onclick="deleteSchedule(${schedule.id})" class="text-gray-300 hover:text-red-400 transition-colors p-2">
                        <i class="ph ph-trash text-xl"></i>
                    </button>
                `;
                
                scheduleList.appendChild(item);
            });

            taskCounter.innerText = `${completedCount}/${schedules.length} Selesai`;
        }

        // Initial Render
        renderSchedules();
    </script>
</body>
</html>
